<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>D RANKY — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --gold:#C9A84C;--gold-light:#E8D5A3;--black:#0D0D0D;--off-black:#1A1A1A;
  --white:#FAFAF7;--muted:#999990;--serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Montserrat',sans-serif;--red:#e55;--green:#2ecc71;
}
body{background:var(--black);color:var(--white);font-family:var(--sans);font-weight:300;min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* ── LOGIN ── */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem;}
.login-box{background:#111;border:1px solid rgba(201,168,76,.2);padding:2.5rem;width:100%;max-width:380px;}
.login-logo{font-family:var(--serif);font-size:2rem;font-weight:300;letter-spacing:.3em;color:var(--gold);text-align:center;margin-bottom:.3rem;}
.login-sub{font-size:.62rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:2rem;}
.field{margin-bottom:1.1rem;}
.field label{display:block;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.45rem;}
.field input{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);color:var(--white);font-family:var(--sans);font-size:.82rem;padding:.7rem 1rem;outline:none;transition:border-color .3s;}
.field input:focus{border-color:var(--gold);}
.err{color:var(--red);font-size:.7rem;margin-top:.5rem;letter-spacing:.05em;}
.btn{background:var(--gold);color:var(--black);border:none;font-family:var(--sans);font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;font-weight:600;padding:.85rem 2rem;cursor:pointer;transition:background .3s;width:100%;margin-top:1rem;}
.btn:hover{background:var(--gold-light);}
.btn.ghost{background:transparent;color:var(--gold);border:1px solid rgba(201,168,76,.3);}
.btn.ghost:hover{background:var(--gold);color:var(--black);}
.btn.danger{background:var(--red);color:#fff;}
.btn.sm{padding:.5rem 1.1rem;font-size:.58rem;width:auto;}
.btn:disabled{opacity:.5;cursor:not-allowed;}

/* ── LAYOUT ── */
#appScreen{display:none;flex-direction:column;min-height:100vh;}
header{background:#080806;border-bottom:1px solid rgba(201,168,76,.15);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.header-logo{font-family:var(--serif);font-size:1.4rem;font-weight:300;letter-spacing:.3em;color:var(--gold);}
.header-badge{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-left:.6rem;}
.header-right{display:flex;align-items:center;gap:1rem;}
.admin-name{font-size:.7rem;letter-spacing:.1em;color:var(--muted);}
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(201,168,76,.1);background:#080806;padding:0 2rem;}
.tab{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:.9rem 1.5rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:color .3s,border-color .3s;background:transparent;border-top:none;border-left:none;border-right:none;font-family:var(--sans);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.main{flex:1;padding:2rem;}

/* ── CARDS / STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--off-black);border:1px solid rgba(201,168,76,.1);padding:1.4rem 1.6rem;}
.stat-val{font-family:var(--serif);font-size:2rem;font-weight:300;color:var(--gold);}
.stat-lbl{font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:.4rem;}

/* ── TABLE ── */
.section-title{font-family:var(--serif);font-size:1.5rem;font-weight:300;color:var(--white);margin-bottom:1.2rem;}
.section-title em{font-style:italic;color:var(--gold);}
.table-wrap{overflow-x:auto;border:1px solid rgba(201,168,76,.1);}
table{width:100%;border-collapse:collapse;font-size:.78rem;}
thead tr{background:#1A1510;}
th{padding:.75rem 1rem;text-align:left;font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);font-weight:400;white-space:nowrap;}
td{padding:.75rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);color:var(--white);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(201,168,76,.03);}
.badge{display:inline-block;font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;padding:.25rem .65rem;border-radius:2px;}
.badge.pending_payment{background:rgba(229,85,85,.15);color:var(--red);}
.badge.paid{background:rgba(46,204,113,.15);color:var(--green);}
.badge.processing{background:rgba(201,168,76,.15);color:var(--gold);}
.badge.shipped{background:rgba(100,150,255,.15);color:#6496ff;}
.badge.delivered{background:rgba(46,204,113,.2);color:var(--green);}
.badge.cancelled{background:rgba(153,153,144,.15);color:var(--muted);}
select.status-select{background:#1A1A1A;border:1px solid rgba(201,168,76,.2);color:var(--white);font-family:var(--sans);font-size:.7rem;padding:.35rem .6rem;cursor:pointer;outline:none;}

/* ── PRODUCT FORM ── */
.product-form{background:var(--off-black);border:1px solid rgba(201,168,76,.1);padding:1.8rem;margin-bottom:2rem;max-width:600px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.form-grid .full{grid-column:1/-1;}
.form-field{display:flex;flex-direction:column;gap:.4rem;}
.form-field label{font-size:.58rem;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
.form-field input,.form-field select,.form-field textarea{background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);color:var(--white);font-family:var(--sans);font-size:.8rem;padding:.65rem .9rem;outline:none;transition:border-color .3s;}
.form-field input:focus,.form-field select:focus,.form-field textarea:focus{border-color:var(--gold);}
.form-field select option{background:#1A1A1A;}
.form-actions{display:flex;gap:.8rem;margin-top:1.2rem;}
.loading{text-align:center;padding:2.5rem;color:var(--muted);font-size:.78rem;letter-spacing:.1em;}
.empty{text-align:center;padding:2rem;color:var(--muted);font-size:.78rem;letter-spacing:.08em;}
.toast{position:fixed;bottom:2rem;right:2rem;background:#111;border:1px solid var(--gold);padding:.9rem 1.6rem;font-size:.75rem;letter-spacing:.08em;z-index:999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.toast.success{border-color:var(--green);color:var(--green);}
.toast.error{border-color:var(--red);color:var(--red);}
@media(max-width:700px){
  .stats-row{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .form-grid .full{grid-column:1;}
  header{padding:.9rem 1rem;}
  .main{padding:1rem;}
  .tabs{padding:0 .5rem;}
  .tab{padding:.8rem .8rem;}
}
</style>
</head>
<body>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-box">
    <p class="login-logo">D RANKY</p>
    <p class="login-sub">Admin Panel</p>
    <div class="field"><label>Email</label><input type="email" id="loginEmail" placeholder="admin@yourdomain.com"/></div>
    <div class="field"><label>Password</label><input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="err" id="loginErr"></div>
    <button class="btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="appScreen">
  <header>
    <div>
      <span class="header-logo">D RANKY</span>
      <span class="header-badge">Admin</span>
    </div>
    <div class="header-right">
      <span class="admin-name" id="adminName"></span>
      <button class="btn ghost sm" onclick="doLogout()">Sign Out</button>
    </div>
  </header>

  <div class="tabs">
    <button class="tab active" onclick="showTab('orders')">Orders</button>
    <button class="tab" onclick="showTab('products')">Products</button>
  </div>

  <div class="main">
    <!-- ORDERS TAB -->
    <div id="tab-orders">
      <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total Orders</div></div>
        <div class="stat-card"><div class="stat-val" id="statPaid">—</div><div class="stat-lbl">Paid</div></div>
        <div class="stat-card"><div class="stat-val" id="statPending">—</div><div class="stat-lbl">Pending Payment</div></div>
        <div class="stat-card"><div class="stat-val" id="statRevenue">—</div><div class="stat-lbl">Total Revenue</div></div>
      </div>
      <h2 class="section-title">All <em>Orders</em></h2>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Tracking ID</th><th>Customer</th><th>Email</th>
            <th>Amount</th><th>Status</th><th>Date</th><th>Update</th>
          </tr></thead>
          <tbody id="ordersBody"><tr><td colspan="7" class="loading">Loading orders…</td></tr></tbody>
        </table>
      </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div id="tab-products" style="display:none">
      <h2 class="section-title" style="margin-bottom:1.5rem;">Add <em>Product</em></h2>
      <div class="product-form">
        <div class="form-grid">
          <div class="form-field full"><label>Product Name</label><input type="text" id="pName" placeholder="e.g. Signature Bomber Jacket"/></div>
          <div class="form-field full"><label>Description</label><textarea id="pDesc" rows="2" placeholder="Brief description…"></textarea></div>
          <div class="form-field">
            <label>Category</label>
            <select id="pCategory">
              <option value="clothes">Clothes</option>
              <option value="shoes">Shoes</option>
              <option value="jackets">Jackets</option>
              <option value="jewelries">Jewelries</option>
              <option value="accessories">Accessories</option>
              <option value="other">Other</option>
            </select>
          </div>
          <div class="form-field"><label>Price (₦)</label><input type="number" id="pPrice" placeholder="25000" min="0"/></div>
          <div class="form-field"><label>Stock Quantity</label><input type="number" id="pStock" placeholder="10" min="0"/></div>
          <div class="form-field"><label>Image URL (optional)</label><input type="text" id="pImage" placeholder="https://…"/></div>
        </div>
        <div class="err" id="productErr"></div>
        <div class="form-actions">
          <button class="btn sm" onclick="createProduct()">Add Product</button>
          <button class="btn ghost sm" onclick="clearProductForm()">Clear</button>
        </div>
      </div>

      <h2 class="section-title">Manage <em>Products</em></h2>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Status</th><th>Action</th>
          </tr></thead>
          <tbody id="productsBody"><tr><td colspan="6" class="loading">Loading products…</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
// ── CONFIG — same URL as index.html
const API = 'https://your-backend-url.com/api';

let token = null;
let currentAdmin = null;

// ── AUTH
async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginErr');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Email and password required.'; return; }

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.message || 'Login failed.'; return; }
    if (data.user.role !== 'admin') { errEl.textContent = 'Access denied. Admins only.'; return; }

    token = data.token;
    currentAdmin = data.user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'flex';
    document.getElementById('adminName').textContent = currentAdmin.fullName;
    loadOrders();
  } catch(e) {
    errEl.textContent = 'Network error.';
  }
}

function doLogout() {
  token = null; currentAdmin = null;
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('loginPassword').value = '';
}

// ── TABS
function showTab(name) {
  ['orders','products'].forEach(t => {
    document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
    document.querySelectorAll('.tab')[t === 'orders' ? 0 : 1].classList.toggle('active', t === name);
  });
  if (name === 'orders') loadOrders();
  if (name === 'products') loadProducts();
}

// ── ORDERS
async function loadOrders() {
  const tbody = document.getElementById('ordersBody');
  tbody.innerHTML = '<tr><td colspan="7" class="loading">Loading…</td></tr>';
  try {
    const res = await fetch(`${API}/orders/admin/all`, { headers: { Authorization: 'Bearer ' + token } });
    const orders = await res.json();
    if (!res.ok) throw new Error(orders.message);

    // Stats
    const paid = orders.filter(o => o.status !== 'pending_payment' && o.status !== 'cancelled');
    const pending = orders.filter(o => o.status === 'pending_payment');
    const revenue = paid.reduce((s, o) => s + o.amount, 0);
    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statPaid').textContent = paid.length;
    document.getElementById('statPending').textContent = pending.length;
    document.getElementById('statRevenue').textContent = '₦' + revenue.toLocaleString();

    if (!orders.length) { tbody.innerHTML = '<tr><td colspan="7" class="empty">No orders yet.</td></tr>'; return; }

    tbody.innerHTML = orders.map(o => `
      <tr>
        <td style="font-family:'Cormorant Garamond',serif;font-size:.95rem;color:var(--gold);letter-spacing:.1em;">${o.trackingId}</td>
        <td>${o.user ? o.user.fullName : '—'}</td>
        <td style="color:var(--muted);font-size:.73rem;">${o.user ? o.user.email : '—'}</td>
        <td style="color:var(--gold);">₦${o.amount.toLocaleString()}</td>
        <td><span class="badge ${o.status}">${o.status.replace('_',' ')}</span></td>
        <td style="color:var(--muted);font-size:.72rem;">${new Date(o.createdAt).toLocaleDateString('en-NG',{day:'numeric',month:'short',year:'numeric'})}</td>
        <td>
          <select class="status-select" onchange="updateOrder('${o._id}',this.value)" ${['pending_payment','delivered','cancelled'].includes(o.status)?'disabled':''}>
            <option value="">Update…</option>
            <option value="processing" ${o.status==='processing'?'selected':''}>Processing</option>
            <option value="shipped" ${o.status==='shipped'?'selected':''}>Shipped</option>
            <option value="delivered" ${o.status==='delivered'?'selected':''}>Delivered</option>
            <option value="cancelled" ${o.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty">Error: ${e.message}</td></tr>`;
  }
}

async function updateOrder(id, status) {
  if (!status) return;
  try {
    const res = await fetch(`${API}/orders/admin/${id}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ status })
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.message || 'Update failed', 'error'); return; }
    showToast('Order updated to ' + status, 'success');
    loadOrders();
  } catch(e) {
    showToast('Network error', 'error');
  }
}

// ── PRODUCTS
async function loadProducts() {
  const tbody = document.getElementById('productsBody');
  tbody.innerHTML = '<tr><td colspan="6" class="loading">Loading…</td></tr>';
  try {
    const res = await fetch(`${API}/products`);
    const products = await res.json();
    if (!res.ok) throw new Error();
    if (!products.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">No products yet. Add one above.</td></tr>'; return; }
    tbody.innerHTML = products.map(p => `
      <tr>
        <td>${p.name}</td>
        <td style="text-transform:capitalize;color:var(--muted);">${p.category}</td>
        <td style="color:var(--gold);">₦${p.price.toLocaleString()}</td>
        <td>${p.stock}</td>
        <td><span class="badge ${p.isActive ? 'paid' : 'cancelled'}">${p.isActive ? 'Active' : 'Archived'}</span></td>
        <td>
          <button class="btn ghost sm" onclick="archiveProduct('${p._id}','${p.name}')" ${!p.isActive?'disabled':''}>Archive</button>
        </td>
      </tr>`).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty">Failed to load products.</td></tr>';
  }
}

async function createProduct() {
  const errEl = document.getElementById('productErr');
  errEl.textContent = '';
  const name = document.getElementById('pName').value.trim();
  const description = document.getElementById('pDesc').value.trim();
  const category = document.getElementById('pCategory').value;
  const price = parseFloat(document.getElementById('pPrice').value);
  const stock = parseInt(document.getElementById('pStock').value);
  const imageUrl = document.getElementById('pImage').value.trim();

  if (!name || !category || isNaN(price) || isNaN(stock)) {
    errEl.textContent = 'Name, category, price and stock are required.'; return;
  }

  try {
    const res = await fetch(`${API}/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ name, description, category, price, stock, imageUrl })
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.message || 'Failed to create.'; return; }
    showToast('Product added: ' + data.name, 'success');
    clearProductForm();
    loadProducts();
  } catch(e) {
    errEl.textContent = 'Network error.';
  }
}

async function archiveProduct(id, name) {
  if (!confirm(`Archive "${name}"? It will be hidden from the store.`)) return;
  try {
    const res = await fetch(`${API}/products/${id}`, {
      method: 'DELETE',
      headers: { Authorization: 'Bearer ' + token }
    });
    const data = await res.json();
    if (!res.ok) { showToast(data.message || 'Failed', 'error'); return; }
    showToast('Product archived', 'success');
    loadProducts();
  } catch(e) {
    showToast('Network error', 'error');
  }
}

function clearProductForm() {
  ['pName','pDesc','pPrice','pStock','pImage'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pCategory').value = 'clothes';
  document.getElementById('productErr').textContent = '';
}

// ── TOAST
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
</script>
</body>
</html>
